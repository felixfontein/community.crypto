- ansible.builtin.debug:
    msg: "Executing tests with backend {{ select_crypto_backend }}"

- name: ({{ select_crypto_backend }}) Get key 1 info
  community.crypto.openssl_publickey_info:
    path: '{{ remote_tmp_dir }}/publickey_1.pem'
    select_crypto_backend: '{{ select_crypto_backend }}'
  register: result

- name: Check that RSA key info is ok
  ansible.builtin.assert:
    that:
      - "'fingerprints' in result"
      - "'type' in result"
      - "result.type == 'RSA'"
      - "'public_data' in result"
      - "2 ** (result.public_data.size - 1) < result.public_data.modulus < 2 ** result.public_data.size"
      - "result.public_data.exponent > 5"

- name: ({{ select_crypto_backend }}) Read file
  ansible.builtin.slurp:
    src: '{{ remote_tmp_dir }}/publickey_1.pem'
  register: slurp

- name: ({{ select_crypto_backend }}) Get key 1 info directly
  community.crypto.openssl_publickey_info:
    content: '{{ slurp.content | b64decode }}'
    select_crypto_backend: '{{ select_crypto_backend }}'
  register: result_direct

- name: ({{ select_crypto_backend }}) Compare output of direct and loaded info
  ansible.builtin.assert:
    that:
      - >-
        (result | dict2items | rejectattr("key", "equalto", "warnings") | list | items2dict)
        ==
        (result_direct | dict2items | rejectattr("key", "equalto", "warnings") | list | items2dict)

- name: ({{ select_crypto_backend }}) Get key 2 info
  community.crypto.openssl_publickey_info:
    path: '{{ remote_tmp_dir }}/publickey_2.pem'
    select_crypto_backend: '{{ select_crypto_backend }}'
  register: result

- name: Check that RSA key info is ok
  ansible.builtin.assert:
    that:
      - "'fingerprints' in result"
      - "'type' in result"
      - "result.type == 'RSA'"
      - "'public_data' in result"
      - "result.public_data.size == default_rsa_key_size"
      - "2 ** (result.public_data.size - 1) < result.public_data.modulus < 2 ** result.public_data.size"
      - "result.public_data.exponent > 5"

- name: ({{ select_crypto_backend }}) Get key 3 info
  community.crypto.openssl_publickey_info:
    path: '{{ remote_tmp_dir }}/publickey_3.pem'
    select_crypto_backend: '{{ select_crypto_backend }}'
  register: result

- name: Check that ECC key info is ok
  ansible.builtin.assert:
    that:
      - "'fingerprints' in result"
      - "'type' in result"
      - "result.type == 'ECC'"
      - "'public_data' in result"
      - "result.public_data.curve is string"
      - "result.public_data.x != 0"
      - "result.public_data.y != 0"
      - "result.public_data.exponent_size == (521 if (ansible_facts.distribution == 'CentOS' and ansible_facts.distribution_major_version == '6') else 256)"

- name: ({{ select_crypto_backend }}) Get key 4 info
  community.crypto.openssl_publickey_info:
    path: '{{ remote_tmp_dir }}/publickey_4.pem'
    select_crypto_backend: '{{ select_crypto_backend }}'
  register: result

- name: Check that DSA key info is ok
  ansible.builtin.assert:
    that:
      - "'fingerprints' in result"
      - "'type' in result"
      - "result.type == 'DSA'"
      - "'public_data' in result"
      - "result.public_data.p > 2"
      - "result.public_data.q > 2"
      - "result.public_data.g >= 2"
      - "result.public_data.y > 2"

- block:
    - name: "({{ select_crypto_backend }}) Create other key type"
      community.crypto.openssl_privatekey:
        path: '{{ remote_tmp_dir }}/privatekey-{{ item.type }}.pem'
        type: "{{ item.type }}"
        select_crypto_backend: '{{ select_crypto_backend }}'
      when: cryptography_version is version(item.min_version, '>=')
      loop: "{{ types }}"
      loop_control:
        label: "{{ item.type }}"
      register: create_result
      ignore_errors: true

    - name: ({{ select_crypto_backend }}) Create public key
      community.crypto.openssl_publickey:
        privatekey_path: '{{ remote_tmp_dir }}/privatekey-{{ item.0.type }}.pem'
        path: '{{ remote_tmp_dir }}/publickey-{{ item.0.type }}.pem'
        select_crypto_backend: '{{ select_crypto_backend }}'
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is succeeded
      loop: "{{ types | zip(create_result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"
      register: result
      ignore_errors: true

    - name: Check that public key was created
      ansible.builtin.assert:
        that:
          - "item.1 is succeeded"
          - "item.1 is changed"
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is not skipped
      loop: "{{ types | zip(result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"

    - name: ({{ select_crypto_backend }}) Create public key (idempotent)
      community.crypto.openssl_publickey:
        privatekey_path: '{{ remote_tmp_dir }}/privatekey-{{ item.0.type }}.pem'
        path: '{{ remote_tmp_dir }}/publickey-{{ item.0.type }}.pem'
        select_crypto_backend: '{{ select_crypto_backend }}'
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is succeeded
      loop: "{{ types | zip(create_result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"
      register: result
      ignore_errors: true

    - name: Check that public key was not re-created
      ansible.builtin.assert:
        that:
          - "item.1 is succeeded"
          - "item.1 is not changed"
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is not skipped
      loop: "{{ types | zip(result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"

    - name: ({{ select_crypto_backend }}) Obtain public key info
      community.crypto.openssl_publickey_info:
        path: '{{ remote_tmp_dir }}/publickey-{{ item.0.type }}.pem'
        select_crypto_backend: '{{ select_crypto_backend }}'
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is succeeded
      loop: "{{ types | zip(create_result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"
      register: result
      ignore_errors: true

    - name: Check that other key info is ok
      ansible.builtin.assert:
        that:
          - "item.1 is succeeded"
          - "'fingerprints' in item.1"
          - "'type' in item.1"
          - "item.0.type == item.1.type"
          - "'public_data' in item.1"
          - "'private_data' not in item.1"
      when: cryptography_version is version(item.0.min_version, '>=') and item.1 is not skipped
      loop: "{{ types | zip(result.results) | list }}"
      loop_control:
        label: "{{ item.0.type }}"

  when: select_crypto_backend == 'cryptography'
  vars:
    types:
      - type: X25519
        min_version: '2.5'
      - type: Ed25519
        min_version: '2.6'
      - type: Ed448
        min_version: '2.6'
      - type: X448
        min_version: '2.6'
      - type: ML-DSA-44
        min_version: '47.0.0'
      - type: ML-DSA-65
        min_version: '47.0.0'
      - type: ML-DSA-87
        min_version: '47.0.0'
